name: cardian

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cardian_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: redis_cache
    restart: always
    networks:
      - cardian_network

  migrations:
    build: .
    container_name: db_migrations
    command: alembic upgrade head
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cardian_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fastapi
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cardian_network
    volumes:
      - .:/app
      - /app/.venv

  celery_worker:
    build: .
    container_name: celery_worker
    command: celery -A app.background.celery_worker worker -l info -P solo
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - OPENBLAS_NUM_THREADS=1
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - cardian_network
    volumes:
      - .:/app
      - /app/.venv

  celery_beat:
    build: .
    container_name: celery_beat
    command: celery -A app.background.celery_worker beat -l info --schedule=/tmp/celerybeat-schedule
    restart: always
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_started
    networks:
      - cardian_network
    volumes:
      - .:/app
      - /app/.venv

  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - cardian_network

networks:
  cardian_network:
    driver: bridge

volumes:
  postgres_data:














