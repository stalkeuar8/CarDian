name: cardian

services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: no
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}   
      POSTGRES_DB: ${DB_NAME}    
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cardian_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - cardian_network


  migrations:
    build: .
    command: alembic upgrade head
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cardian_network
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: fastapi
    restart: always
    env_file:
      - .env
    ports:
      - "8008:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cardian_network
    volumes:
      - .:/app
      - /app/.venv
  celery_worker:
    build: .
    command: celery -A app.background.celery_worker.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    networks:
      - cardian_network
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

networks:
  cardian_network:
    driver: bridge

volumes:
  postgres_data:





